<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Todo App</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">

      <div class="header">
        <h1>My Todos</h1>
        <button id="themeBtn">🌙</button>
      </div>

      <!-- Add Todo -->
      <div class="todo-form">

        <div class="input-box">
          <label>Name</label>
          <input
            type="text"
            id="title"
            placeholder="Task name..."
          />
        </div>

        <div class="input-box">
          <label>Description</label>
          <input
            type="text"
            id="description"
            placeholder="Description..."
          />
        </div>

        <button id="addBtn">
          Add Todo
        </button>

      </div>

      <!-- Todo List -->
      <div id="todoList"></div>

      <!-- Bottom Buttons -->
      <div class="buttons">
        <button id="clearBtn">
          Clear All
        </button>
      </div>

    </div>

    <!-- Edit Modal -->
    <div id="modal" class="modal">

      <div class="modal-content">

        <h2>Edit Todo</h2>

        <div class="input-box">
          <label>Name</label>

          <input
            type="text"
            id="editTitle"
          />
        </div>

        <div class="input-box">
          <label>Description</label>

          <input
            type="text"
            id="editDescription"
          />
        </div>

        <div class="modal-buttons">
          <button id="saveBtn">
            Save
          </button>

          <button id="cancelBtn">
            Cancel
          </button>
        </div>

      </div>

    </div>

    <script src="./app.js"></script>

  </body>
</html>
